[profile.default]
src = "contracts"
test = "test"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet = "${BASE_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_SEPOLIA_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
base_mainnet = { key = "${BASESCAN_MAINNET_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }
