name: Deploy Contracts

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        options:
          - sepolia
          - mainnet
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network || 'sepolia' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - name: Write deployer key file
        run: |
          install -m 600 /dev/null /tmp/onlytrust-deployer.key
          printf '%s' "${{ secrets.DEPLOYER_PRIVATE_KEY }}" > /tmp/onlytrust-deployer.key
      - name: Deploy
        env:
          DEPLOYER_KEY_PATH: /tmp/onlytrust-deployer.key
          PLATFORM_SIGNER_ADDRESS: ${{ secrets.PLATFORM_SIGNER_ADDRESS }}
          FEE_RECIPIENT_ADDRESS: ${{ secrets.FEE_RECIPIENT_ADDRESS }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.network }}" = "mainnet" ]; then
            npm run deploy:base
          else
            npm run deploy:sepolia
          fi
